version: '3.8'

services:
  api:
    build:
      context: ./azsignal-api
      dockerfile: Dockerfile.node
    container_name: azsignal-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./azsignal-api/prisma/data:/app/prisma/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # The database URL maps to the persistent volume mount inside the container
      - DATABASE_URL=file:./data/dev.db
      - JWT_SECRET=your_super_secret_jwt_key_here
      # Assuming Oracle server runs everything locally via docker bridge
      - WEBHOOK_SECRET=your_webhook_secret_here

  scanner:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: azsignal-bot
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Map the python bot to the Node API container over the internal docker network
      - WEBHOOK_URL=http://api:3000/api/webhook
      - WEBHOOK_SECRET=your_webhook_secret_here
      # Add Binance/Bybit API keys here
      - BINANCE_API_KEY=
      - BINANCE_API_SECRET=
